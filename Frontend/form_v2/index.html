<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola, usuario</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!--Sección con padding-->
    <section style="padding: 40px;">

        <!--Div-->
        <div class="container align-content-center">
            <h1 class="justify-content-start">Hola, usuaria</h1>

            <div class="container">
                
                <ul class="nav nav-tabs justify-content-end">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">
                            <input id="fecha" name="fecha" class="form-control" type="date">
                        </a>
                    </li>
                </ul>

                <div class="card">

                    <div class="card-body" id="selectInline">
                        
                        <table id="formTable" class="table table-borderless">

                            <tbody>

                                <tr>
                                    <th scope="row">
                                        <p>Usuario: </p>
                                    </th>
                                    <th scope="row">
                                        <select style="width: 150px;" class="form-select" name="id_profesional" id="id_profesional" form="select">
                                            <option selected>Seleccionar</option>
                                            <option value="1">Name1</option>
                                            <option value="2">Name2</option>
                                            <option value="3">Name3</option>
                                        </select>
                                    </th>
                                    <th scope="row">
                                        <p>Hora inicio: </p>
                                    </th>
                                    <th scope="row">
                                        <div class="cs-form">
                                            <div class="input-group" style="width: 150px;">
                                                <input class="form-control" style="width: 90px;" type="time" id="horaInicio" value="08:00" min="08:00" max="15:00" required>
                                                <span class="input-group-text">
                                                    <i class="bi bi-clock"></i>
                                                </span>
                                            </div>
                                            <!-- <div class="input-group log-event" style="width: 150px;" id="datetimepicker1" data-td-target-input="nearest" data-td-target-toggle="nearest">
                                                <input type="horaFin" type="text" class="form-control" data-td-target="#datetimepicker1">
                                                <span class="input-group-text" data-td-target="#datetimepicker1" data-td-toggle="datetimepicker">
                                                    <i class="bi bi-clock"></i>
                                                </span>
                                            </div> -->
                                        </div>
                                    </th>
                                </tr>

                                <tr>
                                    <th scope="row">
                                        <p>Servicio: </p>
                                    </th>
                                    <th scope="row">
                                        <select style="width: 150px;" class="form-select" name="id_servicio id="id_servicio" form="select">
                                            <option selected>Seleccionar</option>
                                            <option value="1">Service1</option>
                                            <option value="2">Service2</option>
                                            <option value="3">Service3</option>
                                        </select>
                                    </th>
                                    <th scope="row">
                                        <p>Hora fin: </p>
                                    </th>
                                    <th scope="row">
                                        <div class="cs-form">
                                            <div class="input-group" style="width: 150px;">
                                                <input class="form-control" style="width: 90px;" type="time" id="horaFin" value="15:00" min="08:00" max="15:00" required>
                                                <span class="input-group-text">
                                                    <i class="bi bi-clock"></i>
                                                </span>
                                            </div>
                                            <!-- <div class="input-group log-event" style="width: 150px;" id="datetimepicker2" data-td-target-input="nearest" data-td-target-toggle="nearest">
                                                <input type="horaFin" type="text" class="form-control" data-td-target="#datetimepicker2">
                                                <span class="input-group-text" data-td-target="#datetimepicker2" data-td-toggle="datetimepicker">
                                                    <i class="bi bi-clock"></i>
                                                </span>
                                            </div> -->
                                        </div>
                                    </th>
                                </tr>

                            </tbody>

                        </table>

                        <!-- <p>Usuario:</p>
                        <select name="id_profesional" id="id_profesional" class="form-select">
                            <option selected>Seleccionar</option>
                            <option value="1">Name1</option>
                            <option value="2">Name2</option>
                            <option value="3">Name3</option>
                        </select>

                        <p>Servicio:</p>
                        <select name="id_servicio" id="id_servicio" class="form-select">
                            <option selected>Seleccionar</option>
                            <option value="1">Servicio1</option>
                            <option value="2">Servicio2</option>
                            <option value="3">Servicio3</option>
                        </select>
                        <br><br>
                        <p>Hora inicio:</p>
                        <input id="horaInicio" value="08:00">

                        <p>Hora fin:</p>
                        <input id="horaFin" value="15:00"> -->

                    </div>

                    <div class="card-footer">
                        <button id="btnSave" class="btn btn-outline-success float-end" data-bs-toggle="modal" data-bs-target="#saveChanges">
                            Guardar
                        </button>
                    </div>

                    <div id="saveChanges" class="modal fade" style="display: none;" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title">Aviso</h1>
                                    <button class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <p>
                                        ¿Estás seguro de que deseas guardar los cambios?
                                    </p>
                                </div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                    <button class="btn btn-success">Guardar cambios</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </section>


    <script src="script.js"></script>
    <script src="../node_modules/@popperjs/core/dist/umd/popper-base.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha256-BRqBN7dYgABqtY9Hd4ynE+1slnEw+roEPFzQ7TRRfcg=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@eonasdan/tempus-dominus@6.9.4/dist/js/tempus-dominus.min.js" crossorigin="anonymous"></script> -->

</body>

</html>
