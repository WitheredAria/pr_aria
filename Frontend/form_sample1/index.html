<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section style="padding: 40px;">
        
            <div class="container align-content-center">
                <h2 class="float-start">Añadir</h2>
                <ul class="nav nav-tabs justify-content-end">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">
                            <input id="fecha" name="fecha" class="form-control" type="date" value="2012-11-08">
                        </a>
                    </li>
                </ul>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th scope="col">Nombre</th>
                                    <th scope="col">Servicio</th>
                                    <th scope="col">Cliente</th>
                                    <th scope="col">Hora (Inicio - Fin)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th scope="row">
                                        <select name="id_profesional" id="id_profesional" form="select">
                                            <option value="" selected>Seleccionar</option>
                                            <option value="">Ana</option>
                                            <option value="">Manuel</option>
                                            <option value="">Fernando</option>
                                        </select>
                                    </th>
                                    <td>
                                        <select name="id_actividad" id="id_actividad" form="select">
                                            <option value="" selected>Seleccionar</option>
                                            <option value="">Xx</option>
                                            <option value="">Yy</option>
                                            <option value="">Zz</option>
                                        </select>
                                    </td>
                                    <td>
                                        <select name="id_usuario" id="id_usuario" form="select">
                                            <option value="" selected>Seleccionar</option>
                                            <option value="">Andrés</option>
                                            <option value="">José</option>
                                            <option value="">Ithaisa</option>
                                        </select>
                                    </td>
                                    <td>
                                        <input type="time" id="horaInicio" name="horaInicio" min="09:00" max="18:00" required/>
                                        <input type="time" id="horaFin" name="horaFin" min="09:00" max="18:00" required/>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-outline-success float-end" data-bs-toggle="modal" data-bs-target="#saveChanges">
                            Guardar
                        </button>
                    </div>

                    <div id="saveChanges" class="modal fade" style="display: none;" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title">Aviso</h1>
                                    <button class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <p>
                                        ¿Estás seguro de que deseas guardar los cambios?
                                    </p>
                                </div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                    <button class="btn btn-success">Guardar cambios</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
    </section>
    
</body>



    <script src="node_modules/@popperjs/core/dist/umd/popper-base.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</html>
